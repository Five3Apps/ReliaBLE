name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; the deploy-docs job elevates what it needs.
permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ ! -d /Applications/Xcode_16.4.app ]; then
            echo "Xcode 16.4 not found. Installed Xcode versions:"
            ls /Applications | grep Xcode || true
            exit 1
          fi
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Verify Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  docc:
    name: DocC catalog
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ ! -d /Applications/Xcode_16.4.app ]; then
            echo "Xcode 16.4 not found. Installed Xcode versions:"
            ls /Applications | grep Xcode || true
            exit 1
          fi
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Verify Swift version
        run: swift --version

      # Builds the static-hosting site AND acts as the DocC validation gate on
      # every PR via --warnings-as-errors. The extra static-hosting flags don't
      # affect validation; they just shape the output for GitHub Pages.
      - name: Build DocC catalog
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation --target ReliaBLE \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path ReliaBLE \
            --output-path ./docs \
            --warnings-as-errors

      # Only publish from master; PRs validate but do not deploy.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy-docs:
    name: Deploy documentation
    if: github.ref == 'refs/heads/master'
    needs: docc
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
